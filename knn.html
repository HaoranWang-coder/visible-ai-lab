<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNN 分类可视化</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">可见的智能</a>
    <nav class="top-nav" aria-label="主导航">
      <a href="index.html">首页</a>
      <a href="kmeans.html">K-Means</a>
      <a href="dbscan.html">DBSCAN</a>
      <a class="active" href="knn.html">KNN</a>
      <a href="bayes.html">朴素贝叶斯</a>
      <a href="perceptron.html">感知机</a>
      <a href="regression.html">线性回归</a>
      <a href="https://github.com/HaoranWang-coder/visible-ai-lab" target="_blank" rel="noopener">项目仓库</a>
    </nav>
  </header>

  <main class="lab-page">
    <div class="lab-title-row">
      <div>
        <p class="eyebrow">分类算法</p>
        <h1>KNN 分类可视化</h1>
      </div>
      <a class="back-link" href="index.html">返回首页</a>
    </div>

    <section class="lab-layout">
      <aside class="panel control-panel">
        <h2>参数控制</h2>
        <label class="range-row" for="knnKValue">
          <span>K 值</span>
          <strong id="knnKValueText">5</strong>
        </label>
        <input id="knnKValue" type="range" min="1" max="9" step="2" value="5">
        <p class="hint">KNN 通常选择奇数 K，便于减少平票。</p>

        <label class="range-row" for="sampleCount">
          <span>每类样本数</span>
          <strong id="sampleCountText">32</strong>
        </label>
        <input id="sampleCount" type="range" min="16" max="60" step="4" value="32">
        <p class="hint">样本越多，分类边界会更细致。</p>

        <label class="option-row" for="showDecisionBoundary">
          <input id="showDecisionBoundary" type="checkbox">
          <span>显示决策边界</span>
        </label>

        <div class="button-stack">
          <button id="regenerateSamplesBtn" type="button">重新生成样本</button>
          <button id="clearTestBtn" class="ghost-button" type="button">清除测试点</button>
        </div>

        <div class="metric-box">
          <span>操作提示</span>
          <strong>点击画布分类</strong>
        </div>
      </aside>

      <section class="canvas-panel">
        <canvas id="knnCanvas" class="lab-canvas" width="760" height="520" aria-label="KNN 分类画布"></canvas>
      </section>

      <aside class="panel explanation-panel">
        <h2>算法解释</h2>
        <p id="knnExplanationText">页面已生成两类样本点。请点击画布添加一个待分类点。</p>
        <div class="result-card">
          <p>当前 K = <strong id="currentKText">5</strong></p>
          <p>红色邻居：<strong id="redCountText">0</strong> 个</p>
          <p>蓝色邻居：<strong id="blueCountText">0</strong> 个</p>
          <p>分类结果：<strong id="classificationText">等待点击</strong></p>
          <p>投票置信度：<strong id="confidenceText">0%</strong></p>
        </div>
      </aside>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/knn.js"></script>
</body>
</html>
