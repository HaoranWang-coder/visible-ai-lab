<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朴素贝叶斯分类可视化</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">可见的智能</a>
    <nav class="top-nav" aria-label="主导航">
      <a href="index.html">首页</a>
      <a href="kmeans.html">K-Means</a>
      <a href="dbscan.html">DBSCAN</a>
      <a href="knn.html">KNN</a>
      <a href="bayes.html" class="active">朴素贝叶斯</a>
      <a href="perceptron.html">感知机</a>
      <a href="regression.html">线性回归</a>
      <a href="https://github.com/HaoranWang-coder/visible-ai-lab" target="_blank" rel="noopener">项目仓库</a>
    </nav>
  </header>

  <main class="lab-page">
    <div class="lab-title-row">
      <div>
        <p class="eyebrow">概率分类算法</p>
        <h1>朴素贝叶斯分类可视化</h1>
      </div>
      <a class="back-link" href="index.html">返回首页</a>
    </div>

    <section class="lab-layout">
      <aside class="panel control-panel">
        <h2>参数控制</h2>
        <label class="range-row" for="bayesSampleCount">
          <span>每类样本数</span>
          <strong id="bayesSampleCountText">36</strong>
        </label>
        <input id="bayesSampleCount" type="range" min="18" max="70" step="2" value="36">

        <label class="range-row" for="bayesSpread">
          <span>类别分散度</span>
          <strong id="bayesSpreadText">0.16</strong>
        </label>
        <input id="bayesSpread" type="range" min="0.08" max="0.26" step="0.02" value="0.16">

        <label class="option-row" for="showBayesBoundary">
          <input id="showBayesBoundary" type="checkbox" checked>
          <span>显示概率决策区域</span>
        </label>

        <div class="button-stack">
          <button id="bayesGenerateBtn" type="button">重新生成样本</button>
          <button id="bayesClearBtn" class="ghost-button" type="button">清除测试点</button>
        </div>

        <div class="metric-box">
          <span>操作提示</span>
          <strong>点击画布分类</strong>
        </div>
      </aside>

      <section class="canvas-panel">
        <canvas id="bayesCanvas" class="lab-canvas" width="760" height="520" aria-label="朴素贝叶斯分类画布"></canvas>
      </section>

      <aside class="panel explanation-panel">
        <h2>算法解释</h2>
        <p id="bayesExplanationText">页面已生成两类样本。点击画布添加待分类点。</p>
        <div class="result-card">
          <p>红类后验概率：<strong id="bayesRedProbText">0%</strong></p>
          <p>蓝类后验概率：<strong id="bayesBlueProbText">0%</strong></p>
          <p>分类结果：<strong id="bayesResultText">等待点击</strong></p>
        </div>
        <div class="step-list">
          <h3>观察重点</h3>
          <ol>
            <li>算法分别估计每一类的 x、y 分布。</li>
            <li>点击位置后计算它属于每一类的概率。</li>
            <li>背景颜色表示不同区域的概率分类倾向。</li>
          </ol>
        </div>
      </aside>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/bayes.js"></script>
</body>
</html>
